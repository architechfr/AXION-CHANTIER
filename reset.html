<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AXION — Nouveau mot de passe</title>
<meta name="theme-color" content="#0A1628">
<link rel="icon" type="image/png" href="assets/img/logo-axion-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: {
      display: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui'],
      sans: ['Inter', 'ui-sans-serif', 'system-ui'],
      mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
    },
    colors: {
      ink:{900:'#070A12',800:'#0A1628',700:'#0F2447',600:'#111827',500:'#1A2233'},
      azure:{300:'#93C5FD',400:'#60A5FA',500:'#3B82F6',600:'#2563EB'},
      cyan:{400:'#38BDF8'}, gold:{400:'#D4A946',500:'#C9A95C'},
      slate2:{300:'#CBD5E1',400:'#94A3B8',500:'#64748B'},
    },
  } } };
</script>

<style>
  :root { color-scheme: dark; }
  *,*::before,*::after { box-sizing: border-box; }
  html,body { background:#0A1628; margin:0; padding:0; min-height:100vh; }
  body { font-family:'Inter',system-ui,sans-serif; color:#E2E8F0; -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; padding:24px; }
  .font-display { font-family:'Space Grotesk',sans-serif; }
  .font-mono { font-family:'JetBrains Mono',monospace; }

  .bg-stage { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0 }
  .bg-stage::before { content:""; position:absolute; top:-10%; left:50%; transform:translateX(-50%);
    width:1100px; height:700px;
    background: radial-gradient(ellipse at center, rgba(59,130,246,.22), rgba(56,189,248,.08) 40%, transparent 70%); filter: blur(20px); }
  .grid-faint { position:fixed; inset:0; background-image: linear-gradient(rgba(148,163,184,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,.06) 1px, transparent 1px); background-size: 44px 44px; pointer-events:none; z-index:0 }

  .glass-strong { background:rgba(13,23,42,.82); border:1px solid rgba(255,255,255,.10); -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px); box-shadow: 0 40px 90px -30px rgba(59,130,246,.4); }
  .text-grad { background: linear-gradient(120deg,#60A5FA,#38BDF8); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .gold-rule { width:140px; height:1.5px; background: linear-gradient(90deg, transparent, #C9A95C, transparent); margin: 12px auto; }

  .btn-azure { background: linear-gradient(135deg,#3B82F6,#2563EB); color:#fff; box-shadow: 0 10px 30px -10px rgba(59,130,246,.6); transition: transform .25s, box-shadow .25s; }
  .btn-azure:hover { transform: translateY(-2px); box-shadow: 0 16px 40px -12px rgba(59,130,246,.75); }
  .btn-azure:disabled { opacity:.55; cursor:not-allowed; transform:none; }

  input[type="password"], input[type="text"] {
    width:100%; background:rgba(10,22,40,.7); border:1px solid rgba(255,255,255,.12); border-radius:10px;
    color:#E2E8F0; padding:12px 14px 12px 42px; font-size:14px; font-family:inherit; outline:none;
    transition:border .15s, box-shadow .15s;
  }
  input:focus { border-color:#60A5FA; box-shadow:0 0 0 3px rgba(96,165,250,.15); }
  .field { position:relative; }
  .field-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:#94A3B8; pointer-events:none; }
  .pwd-eye { position:absolute; right:6px; top:50%; transform:translateY(-50%); padding:6px 10px; background:none; border:none; color:#94A3B8; font-size:18px; cursor:pointer; line-height:1 }
  .pwd-eye:hover { color:#E2E8F0 }

  .msg { margin-top:14px; padding:11px 13px; border-radius:10px; font-size:13px; display:none }
  .msg.err { display:block; background:rgba(239,68,68,.12); color:#FCA5A5; border:1px solid rgba(239,68,68,.3) }
  .msg.ok  { display:block; background:rgba(34,197,94,.10); color:#86EFAC; border:1px solid rgba(34,197,94,.3) }

  /* Bar de force du mot de passe */
  .strength { display:flex; gap:4px; margin-top:8px; height:4px; }
  .strength .seg { flex:1; border-radius:2px; background:rgba(255,255,255,.06); transition: background .25s; }
  .strength.s1 .seg:nth-child(1) { background:#F87171; }
  .strength.s2 .seg:nth-child(-n+2) { background:#F59E0B; }
  .strength.s3 .seg:nth-child(-n+3) { background:#FBBF24; }
  .strength.s4 .seg { background:#34D399; }
  .strength-label { font-size:11px; color:var(--text-faint, #64748B); margin-top:6px; min-height:14px; }

  a:focus-visible, button:focus-visible { outline:2px solid #60A5FA; outline-offset:3px; border-radius:4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="bg-stage"></div>
<div class="grid-faint"></div>

<div class="relative z-10 w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-7">
    <a href="axion.html" class="inline-flex items-center gap-2.5">
      <img src="assets/img/logo-axion-icon.png" alt="" class="w-10 h-10 rounded-xl" />
      <span class="font-display text-xl font-700 tracking-[0.22em] text-white">AXION</span>
    </a>
  </div>

  <div class="glass-strong rounded-2xl p-8 md:p-10">
    <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-azure-400">Sécurité</p>
    <h1 class="font-display text-2xl md:text-3xl font-700 text-white tracking-tight mt-1">
      Nouveau <span class="text-grad">mot de passe</span>
    </h1>
    <p class="mt-2 text-sm text-slate2-400" id="email-info">Choisissez votre nouveau mot de passe.</p>

    <form id="resetForm" autocomplete="on" class="mt-6 space-y-4">
      <div>
        <label for="pwd" class="block text-xs font-medium text-slate2-400 mb-1.5 tracking-wide">Nouveau mot de passe</label>
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="pwd" type="password" required autocomplete="new-password" minlength="8" placeholder="Au moins 8 caractères">
          <button type="button" id="togglePwd" class="pwd-eye" aria-label="Afficher le mot de passe">👁</button>
        </div>
        <div class="strength" id="strength"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div>
        <label for="pwd2" class="block text-xs font-medium text-slate2-400 mb-1.5 tracking-wide">Confirmer</label>
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="pwd2" type="password" required autocomplete="new-password" minlength="8" placeholder="Retapez le même mot de passe">
        </div>
      </div>
      <button type="submit" id="submitBtn" class="btn-azure w-full rounded-xl px-5 py-3 text-sm font-semibold mt-2 flex items-center justify-center gap-2">
        Mettre à jour
      </button>
    </form>

    <div id="msg" class="msg"></div>

    <p class="mt-5 text-center text-xs"><a href="login.html" class="text-slate2-500 hover:text-azure-400 transition-colors">← Retour à la connexion</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/axion-auth.js"></script>
<script>
(async function () {
  var sb = AxionAuth.sb;
  var form = document.getElementById('resetForm');
  var btn = document.getElementById('submitBtn');
  var msgEl = document.getElementById('msg');
  var pwd = document.getElementById('pwd');
  var pwd2 = document.getElementById('pwd2');
  var emailInfo = document.getElementById('email-info');

  function showMsg(t, type) { msgEl.textContent = t; msgEl.className = 'msg ' + type; }

  // Œil afficher/masquer
  document.getElementById('togglePwd').addEventListener('click', function () {
    var show = pwd.type === 'password';
    pwd.type = show ? 'text' : 'password';
    this.textContent = show ? '🙈' : '👁';
    pwd.focus();
  });

  // Force du mot de passe (4 niveaux : faible/moyen/bon/fort)
  function strength(s) {
    var sc = 0;
    if (s.length >= 8) sc++;
    if (s.length >= 12) sc++;
    if (/[A-Z]/.test(s) && /[a-z]/.test(s)) sc++;
    if (/[0-9]/.test(s) && /[^A-Za-z0-9]/.test(s)) sc++;
    return sc;
  }
  var lvlLabels = ['', 'Faible', 'Moyen', 'Bon', 'Fort'];
  pwd.addEventListener('input', function () {
    var s = strength(pwd.value);
    document.getElementById('strength').className = 'strength' + (s ? ' s' + s : '');
    document.getElementById('strengthLabel').textContent = pwd.value ? lvlLabels[s] : '';
  });

  // Au chargement : Supabase a posé une session de type "recovery"
  // (la session vient du lien magique dans le mail). On la lit pour afficher l'email.
  // Le SDK détecte la session dans l'URL et la pose tout seul si detectSessionInUrl
  // est true ; sinon on doit faire setSession manuellement à partir du hash.
  var hash = window.location.hash || '';
  if (hash.indexOf('access_token=') >= 0) {
    var params = new URLSearchParams(hash.substring(1));
    var at = params.get('access_token');
    var rt = params.get('refresh_token');
    if (at && rt) {
      try {
        await sb.auth.setSession({ access_token: at, refresh_token: rt });
        history.replaceState(null, '', location.pathname);
      } catch (e) {}
    }
  }

  var sess = (await sb.auth.getSession()).data.session;
  if (!sess) {
    showMsg('Lien expiré ou invalide. Demandez un nouveau lien depuis la page de connexion.', 'err');
    btn.disabled = true;
    return;
  }
  if (sess.user && sess.user.email) {
    emailInfo.innerHTML = 'Choisissez votre nouveau mot de passe pour <b style="color:#E2E8F0">' + escapeHtml(sess.user.email) + '</b>.';
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    if (pwd.value !== pwd2.value) {
      showMsg('Les deux mots de passe ne correspondent pas.', 'err');
      return;
    }
    if (pwd.value.length < 8) {
      showMsg('Le mot de passe doit faire au moins 8 caractères.', 'err');
      return;
    }
    btn.disabled = true;
    var prev = btn.innerHTML;
    btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px"></span> Mise à jour…';
    try {
      var res = await sb.auth.updateUser({ password: pwd.value });
      if (res.error) throw res.error;
      showMsg('Mot de passe mis à jour. Redirection vers le tableau de bord…', 'ok');
      setTimeout(function () { window.location.href = 'app.html'; }, 1200);
    } catch (err) {
      showMsg((err && err.message) || 'Erreur lors de la mise à jour.', 'err');
      btn.disabled = false;
      btn.innerHTML = prev;
    }
  });

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
})();
</script>
</body>
</html>
