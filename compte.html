<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AXION — Mon compte</title>
<meta name="theme-color" content="#0A1628">
<link rel="icon" type="image/png" href="assets/img/logo-axion-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: {
      display: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui'],
      sans: ['Inter', 'ui-sans-serif', 'system-ui'],
      mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
    },
    colors: {
      ink:{900:'#070A12',800:'#0A1628',700:'#0F2447',600:'#111827',500:'#1A2233'},
      azure:{300:'#93C5FD',400:'#60A5FA',500:'#3B82F6',600:'#2563EB'},
      cyan:{400:'#38BDF8'}, gold:{400:'#D4A946',500:'#C9A95C'},
      slate2:{300:'#CBD5E1',400:'#94A3B8',500:'#64748B'},
    },
  } } };
</script>

<style>
  :root { color-scheme: dark; --bg:#0A1628; --surface:#0F1B30; --glass:rgba(255,255,255,.04);
    --border:rgba(125,165,225,.16); --azure:#3B82F6; --text:#E2E8F0; --text-dim:#94A3B8; --text-faint:#64748B; }
  *,*::before,*::after { box-sizing: border-box; }
  html,body { background:var(--bg); margin:0; padding:0; min-height:100vh; }
  body { font-family:'Inter',system-ui,sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; }
  .font-display { font-family:'Space Grotesk',sans-serif; }
  .font-mono { font-family:'JetBrains Mono',monospace; }

  body::before { content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background: radial-gradient(900px 500px at 85% -8%, rgba(59,130,246,.10), transparent 60%); }

  /* App bar reprise de chantier.html / app.html */
  .appbar { position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:16px; padding:12px 24px;
    background: color-mix(in oklab, var(--bg) 80%, transparent);
    backdrop-filter: blur(16px) saturate(140%); border-bottom:1px solid var(--border); }
  .appbar .brand { display:flex; align-items:center; gap:11px; }
  .appbar .brand img { width:36px; height:36px; border-radius:10px; }
  .appbar .brand .word { font-family:'Space Grotesk'; font-weight:700; letter-spacing:.22em; font-size:17px; }
  .spacer { flex:1; }
  .icon-btn { width:38px; height:38px; border-radius:10px; display:grid; place-items:center;
    background:var(--glass); border:1px solid var(--border); color:var(--text-dim); transition:.15s; text-decoration:none; }
  .icon-btn:hover { color:var(--text); }
  .icon-btn svg { width:18px; height:18px; }

  .layout { max-width:760px; margin:0 auto; padding:40px 28px 60px; position:relative; z-index:1; }
  h1 { font-family:'Space Grotesk'; font-size:30px; font-weight:700; margin:0 0 8px; letter-spacing:-.02em; }
  .lead { color:var(--text-dim); font-size:14.5px; margin:0 0 32px; }
  .kicker { font-family:'JetBrains Mono'; font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--azure); margin:0 0 8px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:16px; }
  .card h3 { font-family:'Space Grotesk'; font-size:17px; font-weight:700; margin:0 0 16px; }

  .kv { display:grid; gap:14px; }
  .kv .k { font-family:'JetBrains Mono'; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-faint); }
  .kv .v { font-size:14px; font-weight:500; margin-top:3px; }

  .pill { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:999px; font-size:11.5px; font-weight:600; background:rgba(245,158,11,.08); border:1px solid rgba(245,158,11,.35); color:#FCD34D; }

  input[type="password"] {
    width:100%; background:rgba(10,22,40,.7); border:1px solid rgba(255,255,255,.12); border-radius:10px;
    color:var(--text); padding:11px 14px 11px 42px; font-size:14px; font-family:inherit; outline:none;
    transition:border .15s, box-shadow .15s;
  }
  input:focus { border-color:#60A5FA; box-shadow:0 0 0 3px rgba(96,165,250,.15); }
  label { display:block; font-size:12px; color:var(--text-dim); margin:0 0 6px; font-weight:500; letter-spacing:.02em; }
  .field { position:relative; margin-bottom:14px; }
  .field-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:#94A3B8; pointer-events:none; }
  .pwd-eye { position:absolute; right:6px; top:50%; transform:translateY(-50%); padding:6px 10px; background:none; border:none; color:#94A3B8; font-size:18px; cursor:pointer; line-height:1 }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:11px 18px; border-radius:10px;
    font-family:'Space Grotesk'; font-weight:600; font-size:13.5px; border:1px solid transparent; cursor:pointer; text-decoration:none;
    transition: transform .18s, background .18s, border-color .18s; }
  .btn-azure { background: linear-gradient(135deg,#3B82F6,#2563EB); color:#fff; box-shadow:0 8px 24px -10px rgba(59,130,246,.6); }
  .btn-azure:hover { transform:translateY(-2px); }
  .btn-azure:disabled { opacity:.55; cursor:not-allowed; transform:none; }
  .btn-glass { background:var(--glass); border-color:var(--border); color:var(--text); }
  .btn-glass:hover { background:rgba(255,255,255,.06); }

  .msg { margin-top:12px; padding:10px 13px; border-radius:10px; font-size:13px; display:none }
  .msg.err { display:block; background:rgba(239,68,68,.12); color:#FCA5A5; border:1px solid rgba(239,68,68,.3) }
  .msg.ok  { display:block; background:rgba(34,197,94,.10); color:#86EFAC; border:1px solid rgba(34,197,94,.3) }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<header class="appbar">
  <a class="brand" href="app.html">
    <img src="assets/img/logo-axion-icon.png" alt="" />
    <span class="word hidden sm:inline">AXION</span>
  </a>
  <div class="spacer"></div>
  <a href="app.html" class="icon-btn" title="Tableau de bord">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
  </a>
  <button id="logoutBtn" class="icon-btn" title="Déconnexion" style="cursor:pointer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
  </button>
</header>

<main class="layout">
  <p class="kicker">Mon compte</p>
  <h1>Votre profil</h1>
  <p class="lead">Vos informations Cadence et la sécurité de votre compte AXION.</p>

  <div class="card">
    <h3>Informations</h3>
    <div class="kv">
      <div><div class="k">Nom</div><div class="v" id="acName">—</div></div>
      <div><div class="k">Adresse e-mail</div><div class="v font-mono" id="acEmail" style="font-size:13px">—</div></div>
      <div><div class="k">Rôle</div><div class="v"><span class="pill" id="acRole">—</span></div></div>
      <div><div class="k">Entreprise</div><div class="v" id="acCompany">—</div></div>
    </div>
  </div>

  <div class="card">
    <h3>Changer mon mot de passe</h3>
    <p class="text-sm" style="color:var(--text-dim); margin:-8px 0 16px; font-size:13px">
      Choisissez un nouveau mot de passe sécurisé. Il sera demandé à votre prochaine connexion.
    </p>
    <form id="pwdForm">
      <label for="np">Nouveau mot de passe</label>
      <div class="field">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input id="np" type="password" minlength="8" required placeholder="Au moins 8 caractères" autocomplete="new-password">
        <button type="button" id="toggleNp" class="pwd-eye" aria-label="Afficher">👁</button>
      </div>
      <label for="np2">Confirmer</label>
      <div class="field">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input id="np2" type="password" minlength="8" required placeholder="Retapez" autocomplete="new-password">
      </div>
      <button type="submit" id="pwdBtn" class="btn btn-azure">Mettre à jour</button>
    </form>
    <div id="pwdMsg" class="msg"></div>
  </div>

  <p style="text-align:center; margin-top:20px; font-size:12.5px; color:var(--text-faint)">
    <a href="app.html" class="hover:text-azure-400 transition-colors" style="color:inherit">← Retour au tableau de bord</a>
  </p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/axion-auth.js"></script>
<script>
(async function () {
  var sb = AxionAuth.sb;
  var sess = await AxionAuth.currentSession();
  if (!sess) { window.location.href = 'login.html'; return; }

  var profile;
  try { profile = await AxionAuth.fetchProfile(sess.user.id); }
  catch (e) { window.location.href = 'login.html?error=role'; return; }

  // Renseigne les infos
  document.getElementById('acName').textContent = profile.full_name || '—';
  document.getElementById('acEmail').textContent = profile.email;
  var rolePill = document.getElementById('acRole');
  rolePill.textContent = profile.role === 'admin' ? 'Administrateur' : 'Entreprise';
  if (profile.role !== 'admin') {
    rolePill.style.background = 'rgba(59,130,246,.08)';
    rolePill.style.borderColor = 'rgba(96,165,250,.35)';
    rolePill.style.color = '#93C5FD';
  }
  if (profile.company_id) {
    try {
      var c = await sb.from('companies').select('name').eq('id', profile.company_id).single();
      if (c.data) document.getElementById('acCompany').textContent = c.data.name;
    } catch (e) {}
  } else {
    document.getElementById('acCompany').textContent = '—';
  }

  // Œil
  document.getElementById('toggleNp').addEventListener('click', function () {
    var i = document.getElementById('np');
    var show = i.type === 'password'; i.type = show ? 'text' : 'password';
    this.textContent = show ? '🙈' : '👁'; i.focus();
  });

  // Changement de mot de passe
  document.getElementById('pwdForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var np = document.getElementById('np').value;
    var np2 = document.getElementById('np2').value;
    var msg = document.getElementById('pwdMsg');
    function show(t, type) { msg.textContent = t; msg.className = 'msg ' + type; }
    if (np !== np2) return show('Les deux mots de passe ne correspondent pas.', 'err');
    if (np.length < 8)  return show('Le mot de passe doit faire au moins 8 caractères.', 'err');

    var btn = document.getElementById('pwdBtn');
    btn.disabled = true; var prev = btn.innerHTML;
    btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px"></span> Mise à jour…';
    try {
      var res = await sb.auth.updateUser({ password: np });
      if (res.error) throw res.error;
      show('Mot de passe mis à jour ✓', 'ok');
      document.getElementById('np').value = '';
      document.getElementById('np2').value = '';
    } catch (err) {
      show((err && err.message) || 'Erreur lors de la mise à jour.', 'err');
    } finally {
      btn.disabled = false; btn.innerHTML = prev;
    }
  });

  // Déconnexion
  document.getElementById('logoutBtn').addEventListener('click', async function () {
    await AxionAuth.signOut(); window.location.href = 'login.html';
  });
})();
</script>
</body>
</html>
