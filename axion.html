<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AXION — Pilotage de chantier · Cadence Architectes</title>
<meta name="theme-color" content="#0c0e14">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --b0:#0c0e14;--b1:#131620;--b2:#1a1e2c;--b3:#232838;--bd:#2e3450;
    --t:#e4e6f0;--t2:#8a90aa;--t3:#5c6280;
    --or:#f59e0b;--g:#22c55e;--r:#ef4444;--bl:#3b82f6;
    --R:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',sans-serif;background:radial-gradient(1200px 600px at 50% -10%,#1a2238,#0c0e14);
    color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{
    width:100%;max-width:400px;background:var(--b1);border:1px solid var(--bd);
    border-radius:var(--R);padding:36px 32px;box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .brand .logo{
    width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--or),#d97706);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#0c0e14;
  }
  .brand h1{font-size:24px;letter-spacing:1px;font-weight:700}
  .sub{color:var(--t2);font-size:13px;margin-bottom:28px}
  label{display:block;font-size:12px;color:var(--t2);margin:14px 0 6px;font-weight:500}
  input{
    width:100%;background:var(--b0);border:1px solid var(--bd);border-radius:8px;
    color:var(--t);padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:border .15s;
  }
  input:focus{border-color:var(--or)}
  button{
    width:100%;margin-top:22px;background:var(--or);color:#0c0e14;border:none;border-radius:8px;
    padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:filter .15s;
  }
  button:hover{filter:brightness(1.06)}
  button:disabled{opacity:.6;cursor:not-allowed}
  .msg{margin-top:16px;padding:11px 13px;border-radius:8px;font-size:13px;display:none}
  .msg.err{display:block;background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
  .msg.ok{display:block;background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.3)}
  .foot{margin-top:24px;text-align:center;color:var(--t3);font-size:11px;line-height:1.6}
  .loading{display:none;text-align:center;color:var(--t2);font-size:13px;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">A</div>
      <h1>AXION</h1>
    </div>
    <div class="sub">Plateforme de pilotage de chantier · Cadence Architectes</div>

    <form id="loginForm" autocomplete="on">
      <label for="email">Adresse e-mail</label>
      <input id="email" type="email" required autocomplete="username" placeholder="vous@entreprise.fr">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" required autocomplete="current-password" placeholder="••••••••">
      <button type="submit" id="submitBtn">Se connecter</button>
    </form>

    <div class="loading" id="loading">Connexion…</div>
    <div class="msg" id="msg"></div>

    <div class="foot">
      Accès réservé. Authentification sécurisée Supabase.<br>
      Un problème de connexion ? Contactez l'administrateur.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/axion-auth.js"></script>
  <script>
    var form = document.getElementById('loginForm');
    var btn = document.getElementById('submitBtn');
    var loading = document.getElementById('loading');
    var msgEl = document.getElementById('msg');

    function showMsg(text, type){ msgEl.textContent = text; msgEl.className = 'msg ' + type; }

    // Message d'erreur éventuel passé en query (?error=role)
    if (location.search.indexOf('error=role') >= 0) {
      showMsg('Votre compte n\'a pas de rôle valide. Contactez l\'administrateur.', 'err');
    }

    // Si déjà connecté → router directement vers le dashboard.
    (async function () {
      try {
        var session = await AxionAuth.currentSession();
        if (session) {
          var profile = await AxionAuth.fetchProfile(session.user.id);
          AxionAuth.routeByRole(profile);
        }
      } catch (e) { /* pas de session → on laisse le formulaire */ }
    })();

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      btn.disabled = true; loading.style.display = 'block'; msgEl.className = 'msg';
      try {
        var res = await AxionAuth.signIn(email, password);
        showMsg('Connecté. Redirection…', 'ok');
        AxionAuth.routeByRole(res.profile);
      } catch (err) {
        var m = (err && err.message) || 'Erreur de connexion';
        if (/invalid login/i.test(m)) m = 'E-mail ou mot de passe incorrect.';
        if (/profil|profile|row|single/i.test(m)) m = 'Aucun profil associé à ce compte. Contactez l\'administrateur.';
        showMsg(m, 'err');
        btn.disabled = false; loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
